name: Deploy site to Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.planning' \
            --exclude='.claude' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='AGENTS.md' \
            --exclude='CLAUDE.md' \
            --exclude='ARCHITECTURE.md' \
            ./ _site/
          # Mirror the resume PDFs to the site root for clean URLs
          cp resume/resume_ats.pdf _site/resume_ats.pdf
          cp resume/resume_visual.pdf _site/resume_visual.pdf
          # Mirror project pages and PDFs to the site root to preserve historical URLs
          cp projects/lego_demo.html _site/lego_demo.html
          cp projects/star_spangler_bannon.html _site/star_spangler_bannon.html
          cp projects/MLB_Player_Value.pdf _site/MLB_Player_Value.pdf
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
